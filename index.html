    /* ── SMART AI ── */
    function aiReply(q,data){
      const ql=q.toLowerCase();
      const lb=data.bodyLogs[data.bodyLogs.length-1];
      const t=data.user.targets;
      const n=data.user.name;
      if(ql.includes('trening')||ql.includes('maslahat')||ql.includes('mashq')){
        return "💪 "+n+", bugungi trening uchun:\n\n1. 🔥 5-10 daqiqa isitish\n2. 🏋️ Compound mashqlardan boshlang\n3. ⏱️ 90-120 sek dam oling\n4. 📊 RIR 2 saqlang\n5. 💧 500ml suv iching\n\nStreakingiz: "+data.streak+" kun! 🎯";
      }
      if(ql.includes('ovqat')||ql.includes('rekomp')||ql.includes('kaloriya')){
        return "🥗 Body Rekomp ovqatlanish:\n\n• Kaloriya: "+t.cal+" kkal/kun\n• Oqsil: "+t.p+"g ⭐ (eng muhim)\n• Yog': "+t.f+"g\n• Uglevod: "+t.c+"g\n\n✅ Har ovqatda 30-40g oqsil yeng!\nTrening keyin 30 min ichida oqsil+uglevod.";
      }
      if(ql.includes('lateral')||ql.includes('texnika')){
        return "🎯 Lateral Raise texnikasi:\n\n✅ To'g'ri:\n• Tirsak 15-20° bukilgan\n• Yelkadan ko'taring\n• Parallel balandlikkacha\n• Sekin tushiring (3 sek)\n\n❌ Xatolar:\n• Juda og'ir yuk\n• Tana bilan tebranish\n\n15-20 takror — ajoyib yelka! 🔥";
      }
      if(ql.includes('pr')||ql.includes('rekord')||ql.includes('kuch')){
        return "🏆 Rekordlaringiz:\n"+data.prs.map(p=>"• "+p.name+": "+p.w+"kg×"+p.r+" (1RM~"+p.e1rm+"kg)").join('\n')+"\n\n📈 Kuch o'stirish:\n1. Har hafta 1-2.5kg qo'shing\n2. 7-9 soat uyqu\n3. Kreatin 5g/kun\n4. RPE 8-9 da ishlang 💪";
      }
      if(ql.includes('tiklanish')||ql.includes('uyqu')||ql.includes('recovery')){
        return "😴 Tiklanish:\n\n1. 7-9 soat uyqu — ENG MUHIM\n2. "+t.water+" stakan suv\n3. Stretching trening orasida\n4. "+t.p+"g oqsil/kun\n5. Sovuq/issiq dush\n\n48-72 soat mushak guruhi uchun dam! 🏆";
      }
      if(ql.includes('oqsil')||ql.includes('protein')){
        const r=(t.p/(lb?lb.wt:75)).toFixed(1);
        return "🥩 Oqsil:\n\nMaqsad: "+t.p+"g/kun\nVazniga: "+r+"g/kg\n"+(parseFloat(r)>=1.6?"✅ Zo'r! Optimal diapazon.":"⚠️ Oshiring — 1.6-2.2g/kg kerak")+"\n\n🍗 Eng yaxshi manbalar:\n• Tovuq: 31g/100g\n• Tuna: 26g/100g\n• Tvorog: 17g/100g\n• Protein shake: 25g 💪";
      }
      if(ql.includes('motivatsiya')||ql.includes('ishla')||ql.includes('ruhiy')){
        return "🔥 Motivatsiya!\n\n\"Disiplin motivatsiyadan kuchli\"\n— Jocko Willink\n\n📊 Sizning yutuqlar:\n• "+data.streak+" kunlik streak 🔥\n• "+data.woCount+" ta trening\n• "+data.prs.length+" ta PR\n\nSiz 99% odamlardan ko'proq ishlayapsiz! 🚀 Bugun ham bir qadam! 💪";
      }
      if(ql.includes('vazn')||ql.includes('ozish')||ql.includes('semirish')){
        const ch=lb&&data.bodyLogs[0]?(lb.wt-data.bodyLogs[0].wt).toFixed(1):'0';

      }
      return "Assalomu alaykum, "+n+"! 👋\n\nYordam bera olaman:\n💪 Trening va mashqlar\n🥗 Ovqatlanish\n🏆 Kuch o'stirish\n😴 Tiklanish\n🥩 Oqsil va makrolar\n⚖️ Vazn\n🔥 Motivatsiya\n\nSavol bering! 🤖";

    /* ── ACTIVE WORKOUT ── */
    function ActiveWorkoutScreen({workout,data,onFinish,onCancel}){
      const {day,startTime}=workout;
      const initSets=()=>day.exercises.map(ex=>{
        const prev=data.woLogs.find(l=>l.day===day.id);
        const pe=prev&&prev.exs?prev.exs.find(e=>e.id===ex.id):null;
        return {id:ex.id,name:ex.name,muscle:ex.muscle,tag:ex.tag,reps:ex.reps,rir:ex.rir,
          sets:Array.from({length:ex.sets},(_,i)=>({w:pe&&pe.sets[i]?pe.sets[i].w:'',r:pe&&pe.sets[i]?pe.sets[i].r:ex.reps,done:false}))};
      });
      const [exSets,setExSets]=useState(initSets);
      const [timer,setTimer]=useState(null);
      const [timerSecs,setTimerSecs]=useState(90);
      const [elapsed,setElapsed]=useState(0);
      const [prFlash,setPrFlash]=useState(null);
      const timerRef=useRef(null);
      useEffect(()=>{
        const t=setInterval(()=>setElapsed(Math.round((Date.now()-startTime)/1000)),1000);
        return()=>clearInterval(t);
      },[startTime]);
      useEffect(()=>{
        if(timer===null){clearInterval(timerRef.current);return;}
        setTimerSecs(timer);clearInterval(timerRef.current);
        timerRef.current=setInterval(()=>setTimerSecs(s=>{if(s<=1){clearInterval(timerRef.current);setTimer(null);return 90;}return s-1;}),1000);
        return()=>clearInterval(timerRef.current);
      },[timer]);
      const updateSet=(ei,si,f,v)=>setExSets(p=>{const n=p.map(e=>({...e,sets:e.sets.map(s=>({...s}))}));n[ei].sets[si][f]=v;return n;});
      const toggleSet=(ei,si)=>setExSets(p=>{
        const n=p.map(e=>({...e,sets:e.sets.map(s=>({...s}))}));
        const s=n[ei].sets[si];s.done=!s.done;
        if(s.done){
          setTimer(90);
          const ex=n[ei],w=parseFloat(s.w||0),r=parseInt(s.r||0);
          const old=data.prs.find(p=>p.eid===ex.id);
          if(w>0&&r>0&&(!old||e1rm(w,r)>old.e1rm)){setPrFlash({name:ex.name,w,r,est:e1rm(w,r)});setTimeout(()=>setPrFlash(null),3000);}
        }
        return n;
      });
      const done=exSets.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
      const total=exSets.reduce((a,e)=>a+e.sets.length,0);
      const m=Math.floor(elapsed/60),s=elapsed%60;
      return(
        <div style={{position:'fixed',inset:0,background:BG,zIndex:100,overflowY:'auto',paddingBottom:100}}>
          {prFlash&&(
            <div style={{position:'fixed',top:0,left:'50%',transform:'translateX(-50%)',background:'linear-gradient(135deg,'+GOLD+',#F97316)',color:INV,padding:'12px 24px',borderRadius:'0 0 16px 16px',zIndex:200,textAlign:'center',animation:'prBurst 0.6s ease',maxWidth:400,width:'100%'}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900}}>🏆 YANGI REKORD!</div>
              <div style={{fontSize:14,fontWeight:700}}>{prFlash.name}: {prFlash.w}kg × {prFlash.r} (1RM ~ {prFlash.est}kg)</div>
            </div>
          )}
          <div style={{background:S1,borderBottom:'1px solid '+BD,padding:'52px 16px 16px',position:'sticky',top:0,zIndex:10,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div>
                <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,color:day.color}}>{day.name}</h2>
                <p style={{color:T2,fontSize:12}}>{day.muscles}</p>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,color:T1}}>{m}:{s<10?'0':''}{s}</div>
                <div style={{fontSize:10,color:T2}}>{done}/{total} set</div>
              </div>
            </div>
            <div style={{height:4,background:S3,borderRadius:4,overflow:'hidden'}}>
              <div style={{width:pct(done,total)+'%',height:'100%',background:day.color,transition:'width 0.4s ease'}}/>
            </div>
          </div>
          {timer!==null&&(
            <div style={{margin:16,background:GOLD+'15',border:'1px solid '+GOLD+'44',borderRadius:14,padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <p style={{color:GOLD,fontSize:11,letterSpacing:2,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>⏱ DAM OLISH</p>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:36,fontWeight:900,color:GOLD,lineHeight:1}}>{timerSecs}s</div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <Btn onClick={()=>setTimer(null)} outline color={GOLD} style={{padding:'6px 12px',fontSize:12}}>O'TKAZ</Btn>
                <Btn onClick={()=>setTimer(120)} color={GOLD} style={{padding:'6px 12px',fontSize:12}}>+120s</Btn>
              </div>
            </div>
          )}
          <div style={{padding:'0 16px'}}>
            {exSets.map((ex,ei)=>(
              <div key={ex.id} style={{marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,paddingTop:8}}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <h3 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:800,color:T1}}>{ex.name}</h3>
                      {ex.tag==='main'&&<Pill color={ACC}>ASOSIY</Pill>}
                      {ex.tag==='superset'&&<Pill color={TEAL}>SUPERSET</Pill>}
                      {ex.tag==='iso'&&<Pill color={PUR}>ISO</Pill>}
                    </div>
                    <p style={{color:T2,fontSize:12}}>{ex.muscle} · {ex.reps} tak · RIR {ex.rir}</p>
                  </div>
                </div>
                <div style={{background:S1,border:'1px solid '+BD,borderRadius:12,overflow:'hidden',boxShadow:SHADOW}}>
                  <div style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr 40px',padding:'8px 14px',borderBottom:'1px solid '+BD,background:S3}}>
                    {['SET','VAZN kg','TAKROR',''].map((h,i)=><span key={i} style={{fontSize:10,color:T2,letterSpacing:1,fontWeight:600}}>{h}</span>)}
                  </div>
                  {ex.sets.map((s,si)=>(
                    <div key={si} style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr 40px',padding:'8px 14px',borderBottom:si<ex.sets.length-1?'1px solid '+BD:'none',background:s.done?day.color+'11':'transparent',transition:'background 0.3s'}}>
                      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:s.done?day.color:T3,alignSelf:'center'}}>{si+1}</span>
                      <input type="number" value={s.w} onChange={e=>updateSet(ei,si,'w',e.target.value)} placeholder="0" style={{background:S3,border:'1px solid '+BD,borderRadius:8,color:T1,padding:'6px 8px',fontSize:16,fontWeight:700,width:'90%',fontFamily:"'Barlow Condensed',sans-serif",outline:'none'}}/>
                      <input type="number" value={s.r} onChange={e=>updateSet(ei,si,'r',e.target.value)} placeholder="0" style={{background:S3,border:'1px solid '+BD,borderRadius:8,color:T1,padding:'6px 8px',fontSize:16,fontWeight:700,width:'90%',marginLeft:'10%',fontFamily:"'Barlow Condensed',sans-serif",outline:'none'}}/>
                      <button onClick={()=>toggleSet(ei,si)} style={{background:s.done?day.color:S3,border:'none',borderRadius:8,width:32,height:32,cursor:'pointer',color:s.done?INV:T3,fontSize:16,alignSelf:'center',transition:'all 0.2s'}}>{s.done?'✓':'○'}</button>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <div style={{padding:16,display:'flex',gap:10}}>
            <Btn onClick={onCancel} outline color={RED} style={{flex:1}}>✕ BEKOR</Btn>
            <Btn onClick={()=>onFinish(exSets,elapsed)} color={ACC} style={{flex:2,fontSize:16}}>✓ TUGATISH</Btn>
          </div>
        </div>
      );
    }

              <Card style={{marginBottom:12}}>
                <p style={{color:T2,fontSize:11,letterSpacing:2,marginBottom:14,fontFamily:"'Barlow Condensed',sans-serif"}}>KUCH PROGRESSI (1RM)</p>
                {data.prs.map(pr=>(
                  <div key={pr.eid} style={{marginBottom:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:13,color:T1}}>{pr.name}</span>
                      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700,color:GOLD}}>{pr.e1rm}kg</span>
                    </div>
                    <div style={{height:6,background:S3,borderRadius:4}}>
                      <div style={{width:Math.min(100,pr.e1rm/200*100)+'%',height:'100%',background:GOLD,borderRadius:4}}/>
                    </div>
                  </div>
                ))}
              </Card>
              <Card style={{marginBottom:12}}>
                <p style={{color:T2,fontSize:11,letterSpacing:2,marginBottom:14,fontFamily:"'Barlow Condensed',sans-serif"}}>HAFTALIK HAJM (t)</p>
                <ResponsiveContainer width="100%" height={100}>
                  <BarChart data={data.woLogs.slice(-6).map(l=>({d:dayShort(l.date),vol:Math.round(l.vol/1000*10)/10}))} margin={{top:0,right:0,bottom:0,left:0}}>
                    <Bar dataKey="vol" fill={PUR} radius={[4,4,0,0]}/>
                    <XAxis dataKey="d" axisLine={false} tickLine={false} tick={{fill:T2,fontSize:9}}/>
                    <YAxis axisLine={false} tickLine={false} tick={{fill:T2,fontSize:9}} width={28}/>
                    <Tooltip contentStyle={{background:S1,border:'1px solid '+BD,borderRadius:8,color:T1,fontSize:11}}/>
                  </BarChart>
                </ResponsiveContainer>
              </Card>
              <Card>
                <p style={{color:T2,fontSize:11,letterSpacing:2,marginBottom:12,fontFamily:"'Barlow Condensed',sans-serif"}}>UMUMIY STATISTIKA</p>
                <StatLine label="Jami trening" value={data.woCount+' ta'}/>
                <StatLine label="Shaxsiy rekordlar" value={data.prs.length+' ta'} color={GOLD}/>
                <StatLine label="Streak" value={data.streak+' kun'} color={ACC}/>
                <StatLine label="Hozirgi vazn" value={last?last.wt+'kg':''} color={T1}/>
                {last&&first&&<StatLine label="Vazn o'zgarishi" value={(last.wt-first.wt).toFixed(1)+'kg'} color={last.wt<first.wt?TEAL:RED}/>}
              </Card>
            </div>
          )}
        </div>
      );
    }

    /* ── AI TAB ── */
    function AITab({data}){
      const lb=data.bodyLogs[data.bodyLogs.length-1];
      const init="Assalomu alaykum, "+data.user.name+"! Men sizning shaxsiy fitness murabbiyingizman. 🤖\n\nJoriy ko'rsatkichlar:\n• Streak: "+data.streak+" kun 🔥\n• Vazn: "+(lb?lb.wt:'?')+" kg\n• PRlar: "+data.prs.length+" ta 🏆\n\nQanday yordam kerak?";
      const [msgs,setMsgs]=useState([{role:'assistant',content:init}]);
      const [input,setInput]=useState('');
      const endRef=useRef(null);
      const quickQs=["Bugungi trening maslahat","Rekomp ovqatlanish","Lateral Raise texnika","PR yaqinmi?","Tiklanish","Oqsil miqdori","Motivatsiya ber!"];
      useEffect(()=>{endRef.current&&endRef.current.scrollIntoView({behavior:'smooth'});},[msgs]);
      const send=(text)=>{
        const q=text||input.trim();if(!q)return;
        setInput('');
        setMsgs(p=>[...p,{role:'user',content:q}]);
        setTimeout(()=>{
          const reply=aiReply(q,data);
          setMsgs(p=>[...p,{role:'assistant',content:reply}]);
        },400);
      };
      return(
        <div style={{display:'flex',flexDirection:'column',height:'100vh',paddingTop:52}}>
          <div style={{padding:'8px 16px 12px',borderBottom:'1px solid '+BD,background:S1}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:40,height:40,borderRadius:12,background:'linear-gradient(135deg,'+ACC+'22,'+PUR+'22)',border:'1px solid '+ACC+'33',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🤖</div>
              <div>
                <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:800,color:T1}}>AI MURABBIY</h2>
                <p style={{color:TEAL,fontSize:11,fontWeight:600}}>● Doim tayyor</p>
              </div>
            </div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'12px 16px',background:BG}}>
            {msgs.map((m,i)=>{
              const isUser=m.role==='user';
              return(
                <div key={i} style={{marginBottom:12,display:'flex',justifyContent:isUser?'flex-end':'flex-start'}}>
                  {!isUser&&<div style={{width:28,height:28,borderRadius:8,background:ACC+'15',border:'1px solid '+ACC+'33',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,marginRight:8,flexShrink:0,alignSelf:'flex-end'}}>🤖</div>}
                  <div style={{maxWidth:'80%',padding:'10px 14px',borderRadius:isUser?'16px 16px 4px 16px':'16px 16px 16px 4px',background:isUser?ACC:S1,border:isUser?'none':'1px solid '+BD,boxShadow:SHADOW}}>
                    <p style={{color:isUser?INV:T1,fontSize:14,lineHeight:1.5,whiteSpace:'pre-wrap'}}>{m.content}</p>
                  </div>
                </div>
              );
            })}
            <div ref={endRef}/>
          </div>
          <div style={{padding:'8px 16px',display:'flex',gap:6,overflowX:'auto',borderTop:'1px solid '+BD,background:S1}}>
            {quickQs.map(q=><button key={q} onClick={()=>send(q)} style={{flexShrink:0,background:ACC+'0D',border:'1px solid '+ACC+'22',borderRadius:20,padding:'6px 12px',color:ACC,fontSize:11,cursor:'pointer',whiteSpace:'nowrap',fontWeight:600}}>{q}</button>)}
          </div>
          <div style={{padding:'8px 16px 24px',display:'flex',gap:8,borderTop:'1px solid '+BD,background:S1}}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')send();}} placeholder="Savol yozing..." style={{flex:1,background:S3,border:'1px solid '+BD,borderRadius:12,color:T1,padding:'10px 14px',fontSize:14,outline:'none'}}/>
            <button onClick={()=>send()} disabled={!input.trim()} style={{background:ACC,border:'none',borderRadius:12,width:44,height:44,cursor:'pointer',fontSize:16,flexShrink:0,opacity:!input.trim()?0.4:1,color:INV,fontWeight:700,transition:'opacity 0.2s'}}>↑</button>
          </div>
        </div>
      );
    }

    /* ── SETTINGS TAB ── */
    function SettingsTab({data,setData}){
      const [form,setForm]=useState({name:data.user.name,age:String(data.user.age),wt:String(data.user.wt),ht:String(data.user.ht),cal:String(data.user.targets.cal),p:String(data.user.targets.p),f:String(data.user.targets.f),c:String(data.user.targets.c),water:String(data.user.targets.water)});
      const save=()=>{
        setData(prev=>({...prev,user:{...prev.user,name:form.name,age:parseInt(form.age)||prev.user.age,wt:parseFloat(form.wt)||prev.user.wt,ht:parseInt(form.ht)||prev.user.ht,targets:{cal:parseInt(form.cal)||prev.user.targets.cal,p:parseInt(form.p)||prev.user.targets.p,f:parseInt(form.f)||prev.user.targets.f,c:parseInt(form.c)||prev.user.targets.c,water:parseInt(form.water)||prev.user.targets.water}}}));
        alert('✅ Saqlandi!');
      };
      const resetData=()=>{
        if(confirm('⚠️ Barcha ma\'lumotlar o\'chirilsinmi?')){localStorage.removeItem('fitlogpro_v2');window.location.reload();}
      };
      return(
        <div style={{padding:'0 16px 16px'}} className="su">
          <div style={{padding:'52px 0 16px'}}>
            <h1 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:34,fontWeight:900,color:T1}}>SOZLAMALAR ⚙️</h1>
          </div>
          <Card style={{marginBottom:12}}>
            <p style={{color:T2,fontSize:11,letterSpacing:2,marginBottom:16,fontFamily:"'Barlow Condensed',sans-serif"}}>SHAXSIY MA'LUMOTLAR</p>
            {[['Ism','name','text'],['Yosh','age','number'],['Vazn (kg)','wt','number'],["Bo'y (sm)",'ht','number']].map(([lbl,key,type])=>(
              <div key={key} style={{marginBottom:14}}>
                <p style={{color:T2,fontSize:12,marginBottom:6}}>{lbl}</p>
                <input type={type} value={form[key]} onChange={e=>setForm(p=>({...p,[key]:e.target.value}))} style={{width:'100%',background:S3,border:'1px solid '+BD,borderRadius:10,color:T1,padding:'10px 14px',fontSize:16,outline:'none'}}/>
              </div>
            ))}
          </Card>
          <Card style={{marginBottom:12}}>
            <p style={{color:T2,fontSize:11,letterSpacing:2,marginBottom:16,fontFamily:"'Barlow Condensed',sans-serif"}}>KUNLIK MAQSADLAR</p>
            {[['Kaloriya (kkal)','cal'],['Oqsil (g)','p'],["Yog' (g)",'f'],['Uglevod (g)','c'],['Suv (stakan)','water']].map(([lbl,key])=>(
              <div key={key} style={{marginBottom:14}}>
                <p style={{color:T2,fontSize:12,marginBottom:6}}>{lbl}</p>
                <input type="number" value={form[key]} onChange={e=>setForm(p=>({...p,[key]:e.target.value}))} style={{width:'100%',background:S3,border:'1px solid '+BD,borderRadius:10,color:T1,padding:'10px 14px',fontSize:16,outline:'none'}}/>
              </div>
            ))}
          </Card>
          <Btn onClick={save} color={ACC} style={{width:'100%',marginBottom:12,fontSize:16}}>✓ SAQLASH</Btn>
          <Card>
            <p style={{color:T2,fontSize:11,letterSpacing:2,marginBottom:12,fontFamily:"'Barlow Condensed',sans-serif"}}>MA'LUMOTLAR</p>
            <p style={{color:T2,fontSize:13,marginBottom:12}}>Barcha trening, ovqat va tana ma'lumotlari qurilmangizda saqlanadi.</p>
            <button onClick={resetData} style={{background:RED+'15',border:'1px solid '+RED+'44',borderRadius:10,color:RED,padding:'10px 20px',fontWeight:700,fontSize:14,cursor:'pointer',width:'100%'}}>🗑️ Barcha ma'lumotlarni o'chirish</button>
          </Card>
        </div>
      );
    }

    /* ── MAIN APP ── */
    function FitLogPro(){
      const [tab,setTab]=useState('home');
      const [data,setData]=useState(getInitial);
      const [activeWorkout,setActiveWorkout]=useState(null);

      useEffect(()=>{try{localStorage.setItem('fitlogpro_v2',JSON.stringify(data));}catch(e){};},[data]);

      const tabs=[
        {id:'home',icon:'🏠',label:'Bosh'},
        {id:'workout',icon:'💪',label:'Trening'},
        {id:'nutrition',icon:'🥗',label:'Ovqat'},
        {id:'body',icon:'📊',label:'Tana'},
        {id:'ai',icon:'🤖',label:'AI'},
        {id:'settings',icon:'⚙️',label:'Sozlama'},
      ];

      const finishWorkout=(exSets,dur)=>{
        const day=activeWorkout.day;
        const newLog={date:td(),prog:activeWorkout.prog.id,day:day.id,dur:Math.round(dur/60),vol:exSets.reduce((a,ex)=>a+volCalc(ex.sets.filter(s=>s.done)),0),exs:exSets.map(ex=>({id:ex.id,name:ex.name,sets:ex.sets}))};
        const newPRs=data.prs.slice();
        exSets.forEach(ex=>{
          ex.sets.filter(s=>s.done&&parseFloat(s.w)>0).forEach(s=>{
            const w=parseFloat(s.w),r=parseInt(s.r||1),est=e1rm(w,r);
            const oi=newPRs.findIndex(p=>p.eid===ex.id);
            if(oi<0||est>newPRs[oi].e1rm){const pr={eid:ex.id,name:ex.name,w,r,date:td(),e1rm:est};if(oi>=0)newPRs.splice(oi,1,pr);else newPRs.push(pr);}
          });
        });
        setData(p=>({...p,woLogs:[...p.woLogs,newLog],prs:newPRs,woCount:p.woCount+1,streak:p.streak+1,lastWo:td(),dayIndex:(p.dayIndex+1)%(activeWorkout.prog.days.length||1)}));
        setActiveWorkout(null);setTab('home');
      };

      return(
        <div style={{background:BG,minHeight:'100vh',maxWidth:430,margin:'0 auto',position:'relative',fontFamily:"'Barlow',sans-serif",color:T1,overflow:'hidden'}}>
          {activeWorkout&&(
            <ActiveWorkoutScreen workout={activeWorkout} data={data} onFinish={finishWorkout} onCancel={()=>setActiveWorkout(null)}/>
          )}
          {!activeWorkout&&(
            <div style={{paddingBottom:76,height:'100vh',overflowY:'auto'}}>
              {tab==='home'&&<HomeTab data={data} setTab={setTab} setActiveWorkout={setActiveWorkout}/>}
              {tab==='workout'&&<WorkoutTab data={data} setData={setData} setActiveWorkout={setActiveWorkout}/>}
              {tab==='nutrition'&&<NutritionTab data={data} setData={setData}/>}
              {tab==='body'&&<BodyTab data={data} setData={setData}/>}
              {tab==='ai'&&<AITab data={data}/>}
              {tab==='settings'&&<SettingsTab data={data} setData={setData}/>}
            </div>
          )}
          {!activeWorkout&&(
            <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:S1,borderTop:'1px solid '+BD,display:'flex',zIndex:90,boxShadow:'0 -2px 12px rgba(0,0,0,0.06)'}}>
              {tabs.map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'8px 0',border:'none',background:'transparent',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                  <span style={{fontSize:tab===t.id?20:18,transition:'all 0.2s',transform:tab===t.id?'scale(1.15)':'scale(1)'}}>{t.icon}</span>
                  <span style={{fontSize:8,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:0.5,color:tab===t.id?ACC:T3}}>{t.label}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<FitLogPro/>);
  </script>
</body>
</html>
