<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="FitLog Pro 2.1 - Premium Fitness & Nutrition" />
  <title>FitLog Pro 2.1</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'></text></svg>">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.15.3/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #F2F2F7;
      --card: #FFFFFF;
      --text: #000000;
      --text2: #8E8E93;
      --border: #E5E5EA;
      --acc: #FF2D55; /* Apple Red/Pink */
      --blue: #007AFF;
      --green: #34C759;
      --orange: #FF9500;
      --purple: #AF52DE;
      --shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { display: none; }
    input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input, button, select { font-family: inherit; }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .su { animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .fi { animation: fadeIn 0.2s ease; }
    
    .card { background: var(--card); border-radius: 20px; padding: 16px; box-shadow: var(--shadow); margin-bottom: 16px; }
    .btn { background: var(--blue); color: #fff; border: none; border-radius: 14px; padding: 14px 20px; font-weight: 600; font-size: 16px; cursor: pointer; transition: transform 0.2s, opacity 0.2s; }
    .btn:active { opacity: 0.7; transform: scale(0.98); }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    
    .input-flat { width: 100%; background: var(--bg); border: none; border-radius: 12px; padding: 14px 16px; font-size: 16px; color: var(--text); outline: none; }
    .input-flat::placeholder { color: var(--text2); }
    
    .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, LineChart, Line } = Recharts;

    /* ── BASE DATA (RAW) ── */
    const RAW_FOODS = [
      {id:'rf1', name:"Tovuq ko'kragi (xom)", cat:'Oqsil', e:'🍗', cal:110, p:23, f:1.2, c:0},
      {id:'rf2', name:"Tuxum (1 dona, xom)", cat:'Oqsil', e:'🥚', cal:72, p:6, f:5, c:0.4},
      {id:'rf3', name:"Mol go'shti (yog'siz, xom)", cat:'Oqsil', e:'🥩', cal:143, p:26, f:3.5, c:0},
      {id:'rf4', name:"Guruch (xom)", cat:'Uglevod', e:'🍚', cal:360, p:7, f:0.5, c:80},
      {id:'rf5', name:"Grechka (xom)", cat:'Uglevod', e:'🌾', cal:343, p:13, f:3.4, c:71},
      {id:'rf6', name:"Kartoshka (xom)", cat:'Uglevod', e:'🥔', cal:77, p:2, f:0.1, c:17},
      {id:'rf7', name:"Suli (Ovsyanka)", cat:'Uglevod', e:'🥣', cal:389, p:17, f:7, c:66},
      {id:'rf8', name:"Banan", cat:'Meva', e:'🍌', cal:89, p:1, f:0.3, c:23},
      {id:'rf9', name:"Tvorog (2%)", cat:'Oqsil', e:'🧀', cal:86, p:16, f:2, c:1.5},
      {id:'rf10', name:"Makaron (xom)", cat:'Uglevod', e:'🍝', cal:350, p:12, f:1.5, c:71},
    ];

    /* ── UTILS ── */
    const td = () => new Date().toISOString().split('T')[0];
    const fmt = (d) => new Date(d).toLocaleDateString('uz-UZ',{day:'numeric',month:'short'});
    const dayShort = (d) => ['Yak','Du','Se','Cho','Pay','Ju','Sha'][new Date(d).getDay()];
    const pct = (a,b) => b>0 ? Math.min(100, Math.round(a/b*100)) : 0;

    /* ── STATE MANAGEMENT ── */
    const getInitial = () => {
      try { const s = localStorage.getItem('fitlog_v3_premium'); if(s) return JSON.parse(s); } catch(e) {}
      return {
        user: { name:'Sportchi', targets:{cal:2500, p:150, f:70, c:300} },
        streak: 0, woCount: 0, currentProgramId: null, dayIndex: 0,
        woLogs: [], nutLogs: [], todayNut: { date: td(), meals:[], cal:0, p:0, f:0, c:0, burnedCal:0 },
        programs: [], customFoods: [], geminiKey: ''
      };
    };

    /* ── SHARED UI COMPONENTS ── */
    const MacroBar = ({label, val, max, color}) => (
      <div style={{marginBottom:12}}>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:6}}>
          <span style={{fontSize:13, color:'var(--text2)', fontWeight:600}}>{label}</span>
          <span style={{fontSize:14, fontWeight:700}}>{Math.round(val)}g <span style={{fontSize:11, color:'var(--text2)', fontWeight:500}}>/{max}</span></span>
        </div>
        <div style={{height:8, background:'var(--bg)', borderRadius:4, overflow:'hidden'}}>
          <div style={{width:pct(val,max)+'%', height:'100%', background:color, borderRadius:4, transition:'width 0.4s ease'}}/>
        </div>
      </div>
    );

    const CalRing = ({cal, target, size}) => {
      const sz=size||140, r=sz*0.38, circ=2*Math.PI*r;
      const dash=Math.min(1,cal/(target||1))*circ;
      return(
        <svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`}>
          <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="var(--bg)" strokeWidth="12"/>
          <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="var(--acc)" strokeWidth="12"
            strokeDasharray={`${dash} ${circ-dash}`} strokeLinecap="round"
            transform={`rotate(-90 ${sz/2} ${sz/2})`} style={{transition:'stroke-dasharray 0.8s ease'}}/>
          <text x={sz/2} y={sz/2-2} textAnchor="middle" fill="var(--text)" fontSize="24" fontWeight="800" style={{fontFeatureSettings:'"tnum"'}}>{Math.round(cal)}</text>
          <text x={sz/2} y={sz/2+14} textAnchor="middle" fill="var(--text2)" fontSize="12" fontWeight="600">/{target}</text>
        </svg>
      );
    };

    /* ── HOME TAB ── */
    function HomeTab({data, setTab, setActiveWorkout, setData}) {
      const prog = data.programs.find(p=>p.id===data.currentProgramId);
      const todayDay = prog && prog.days.length > 0 ? prog.days[data.dayIndex % prog.days.length] : null;
      const nut = data.todayNut;

      return (
        <div style={{padding:'0 16px 100px'}} className="su">
          <div style={{padding:'70px 0 24px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <div>
              <p style={{color:'var(--text2)', fontSize:13, fontWeight:600, textTransform:'uppercase', letterSpacing:0.5}}>Xush kelibsiz</p>
              <h1 style={{fontSize:32, fontWeight:800, letterSpacing:'-0.5px'}}>{data.user.name}</h1>
            </div>
            <div style={{width:54, height:54, borderRadius:27, background:'linear-gradient(135deg, var(--orange), var(--acc))', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, fontWeight:800, boxShadow:'0 4px 14px rgba(255,45,85,0.4)'}}>
              {data.streak}
            </div>
          </div>

          <div className="card" style={{background: 'var(--text)', color:'#fff', padding:'20px'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:20}}>
              <div>
                <p style={{fontSize:12, color:'#8E8E93', fontWeight:700, letterSpacing:1, marginBottom:6}}>BUGUNGI MASHQ</p>
                <h2 style={{fontSize:26, fontWeight:800}}>{todayDay ? todayDay.name : "Dam olish / Dastur yo'q"}</h2>
              </div>
              {prog && <span style={{background:'rgba(255,255,255,0.15)', color:'#fff', fontSize:11, fontWeight:700, padding:'6px 12px', borderRadius:20}}>{prog.name}</span>}
            </div>
            {todayDay && todayDay.exercises.length > 0 ? (
              <button className="btn" style={{width:'100%', background:'var(--green)', color:'#fff', boxShadow:'0 4px 14px rgba(52,199,89,0.3)', fontSize:17}} onClick={()=>{setActiveWorkout({prog, day:todayDay, startTime:Date.now()}); setTab('workout');}}>
                Mashqni Boshlash
              </button>
            ) : (
              <button className="btn" style={{width:'100%', background:'#3A3A3C', color:'#fff'}} onClick={()=>setTab('workout')}>
                Dastur Tuzish
              </button>
            )}
          </div>

          <div className="card" style={{padding:'24px 20px'}}>
            <h3 style={{fontSize:18, fontWeight:700, marginBottom:20}}>Faollik Halqalari</h3>
            <div style={{display:'flex', alignItems:'center', gap:24}}>
              <CalRing cal={nut.cal} target={data.user.targets.cal} size={120}/>
              <div style={{flex:1}}>
                <MacroBar label="Oqsil" val={nut.p} max={data.user.targets.p} color="var(--blue)"/>
                <MacroBar label="Yog'" val={nut.f} max={data.user.targets.f} color="var(--orange)"/>
                <MacroBar label="Uglevod" val={nut.c} max={data.user.targets.c} color="var(--purple)"/>
              </div>
            </div>
            
            <div style={{marginTop:24, paddingTop:24, borderTop:'1px solid var(--border)'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <span style={{fontSize:22}}>⌚️</span>
                  <h4 style={{fontSize:16, fontWeight:700}}>Apple Health / Watch</h4>
                </div>
                <span style={{background:'rgba(255,45,85,0.1)', color:'var(--acc)', fontWeight:800, padding:'4px 10px', borderRadius:10, fontSize:14}}>{nut.burnedCal || 0} kkal yoqildi</span>
              </div>
              <p style={{fontSize:13, color:'var(--text2)', marginBottom:12, lineHeight:1.4}}>Bugungi mashqlar yoki yurish orqali yoqilgan kaloriyani kiriting (Shortcuts orqali avtomatlashgan).</p>
              <div style={{display:'flex', gap:8}}>
                <input type="number" className="input-flat" placeholder="Kkal kiritish..." style={{border:'1px solid var(--border)', flex:1}}
                  onBlur={(e)=>{
                    const val = parseInt(e.target.value);
                    if(!isNaN(val)) setData(p=>({...p, todayNut:{...p.todayNut, burnedCal:val}}));
                    e.target.value='';
                  }}
                  onKeyDown={(e)=>{
                    if(e.key==='Enter') {
                      const val = parseInt(e.target.value);
                      if(!isNaN(val)) setData(p=>({...p, todayNut:{...p.todayNut, burnedCal:val}}));
                      e.target.value='';
                    }
                  }}
                />
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── WORKOUT & PROGRAM BUILDER ── */
    function WorkoutTab({data, setData, setActiveWorkout}) {
      const [view, setView] = useState('list');
      const [editProg, setEditProg] = useState(null);

      // Barcha mashqlarni yig'ish (chart uchun)
      const allExs = Array.from(new Set((data.woLogs||[]).flatMap(log => log.exs.map(e => e.name))));
      const [selEx, setSelEx] = useState(allExs.length > 0 ? allExs[0] : '');

      const openBuilder = (prog = null) => {
        setEditProg(prog ? JSON.parse(JSON.stringify(prog)) : { id:'p'+Date.now(), name:'Yangi Dastur', days:[] });
        setView('builder');
      };

      const saveProg = () => {
        if(!editProg.name.trim()) return alert("Dastur nomini yozing!");
        setData(p => {
          const np = [...p.programs];
          const i = np.findIndex(x=>x.id===editProg.id);
          if(i>=0) np[i] = editProg; else np.push(editProg);
          return {...p, programs: np, currentProgramId: editProg.id};
        });
        setView('list');
      };

      // Progress Chart Data
      const chartData = (data.woLogs||[]).filter(log => log.exs.some(e=>e.name===selEx)).map(log => {
        const ex = log.exs.find(e=>e.name===selEx);
        let maxW = 0;
        ex.sets.forEach(s => {
          if(s.done && s.w) {
             let w = parseFloat(s.w);
             if(s.type==='plita') w *= 5; // Chart uchun plitani 5kg deb chamalaymiz
             if(w>maxW) maxW = w;
          }
        });
        return { date: fmt(log.date), kg: maxW };
      });

      if(view === 'builder') {
        return (
          <div style={{padding:'0 16px 100px'}} className="su">
            <div className="glass" style={{padding:'60px 0 16px', display:'flex', gap:12, alignItems:'center', position:'sticky', top:0, zIndex:10}}>
              <button onClick={()=>setView('list')} style={{border:'none', background:'var(--bg)', borderRadius:14, padding:'10px 14px', fontWeight:700, color:'var(--blue)', fontSize:16}}>Orqaga</button>
              <h1 style={{fontSize:24, fontWeight:800}}>Dastur Tuzish</h1>
            </div>
            
            <input className="input-flat" value={editProg.name} onChange={e=>setEditProg({...editProg, name:e.target.value})} placeholder="Dastur nomi (Masalan: PPL)" style={{marginBottom:20, marginTop:10, fontSize:18, fontWeight:700, boxShadow:'0 2px 8px rgba(0,0,0,0.03)'}}/>
            
            {editProg.days.map((day, di) => (
              <div key={day.id} className="card" style={{borderLeft:'5px solid var(--blue)', padding:'20px 16px'}}>
                <div style={{display:'flex', justifyContent:'space-between', marginBottom:16}}>
                  <input className="input-flat" value={day.name} onChange={e=>{const nd=[...editProg.days]; nd[di].name=e.target.value; setEditProg({...editProg, days:nd});}} placeholder="Kun nomi (Ko'krak kuni)" style={{padding:'8px 12px', background:'var(--bg)', fontSize:18, fontWeight:700, width:'80%'}}/>
                  <button onClick={()=>{const nd=editProg.days.filter((_,i)=>i!==di); setEditProg({...editProg, days:nd});}} style={{background:'rgba(255,45,85,0.1)', border:'none', color:'var(--acc)', borderRadius:12, width:40, height:40, fontSize:20}}>✕</button>
                </div>
                
                {day.exercises.map((ex, ei) => (
                  <div key={ei} style={{background:'var(--bg)', borderRadius:16, padding:12, marginBottom:12}}>
                    <div style={{display:'flex', gap:8, marginBottom:10}}>
                      <input className="input-flat" value={ex.name} onChange={e=>{const nd=[...editProg.days]; nd[di].exercises[ei].name=e.target.value; setEditProg({...editProg, days:nd});}} placeholder="Mashq nomi" style={{padding:'10px 12px', flex:2, background:'#fff'}}/>
                      <input type="number" className="input-flat" value={ex.sets} onChange={e=>{const nd=[...editProg.days]; nd[di].exercises[ei].sets=parseInt(e.target.value)||0; setEditProg({...editProg, days:nd});}} placeholder="Set" style={{padding:'10px 12px', flex:1, background:'#fff'}}/>
                      <button onClick={()=>{const nd=[...editProg.days]; nd[di].exercises.splice(ei,1); setEditProg({...editProg, days:nd});}} style={{background:'none', border:'none', color:'var(--text2)', padding:'0 8px'}}>✕</button>
                    </div>
                    <input className="input-flat" value={ex.link||''} onChange={e=>{const nd=[...editProg.days]; nd[di].exercises[ei].link=e.target.value; setEditProg({...editProg, days:nd});}} placeholder="Mashq video havolasi (Telegram/YouTube link)" style={{padding:'10px 12px', fontSize:13, color:'var(--blue)', background:'#fff'}}/>
                  </div>
                ))}
                <button onClick={()=>{const nd=[...editProg.days]; nd[di].exercises.push({name:'', sets:3, link:''}); setEditProg({...editProg, days:nd});}} style={{background:'rgba(0,122,255,0.1)', border:'none', color:'var(--blue)', width:'100%', padding:'12px', borderRadius:12, fontWeight:700, fontSize:14}}>+ Mashq qo'shish</button>
              </div>
            ))}
            
            <button className="btn btn-outline" style={{width:'100%', marginBottom:16, borderStyle:'dashed', borderColor:'var(--text2)'}} onClick={()=>{setEditProg({...editProg, days:[...editProg.days, {id:'d'+Date.now(), name:'', exercises:[]}]})}}>+ Yangi Kun Qo'shish</button>
            <button className="btn" style={{width:'100%', background:'var(--green)', boxShadow:'0 4px 14px rgba(52,199,89,0.3)', fontSize:18}} onClick={saveProg}>Saqlash</button>
          </div>
        );
      }

      return (
        <div style={{padding:'0 16px 100px'}} className="su">
          <div style={{padding:'70px 0 24px'}}>
            <h1 style={{fontSize:32, fontWeight:800}}>Mashqlar</h1>
          </div>

          {allExs.length > 0 && (
            <>
              <h3 style={{fontSize:20, fontWeight:700, marginBottom:16}}>Mashq Progressi (Tarix)</h3>
              <div className="card" style={{padding:'16px'}}>
                <select className="input-flat" value={selEx} onChange={e=>setSelEx(e.target.value)} style={{background:'var(--bg)', marginBottom:16, fontWeight:600}}>
                  {allExs.map(e=><option key={e} value={e}>{e}</option>)}
                </select>
                {chartData.length > 0 ? (
                  <ResponsiveContainer width="100%" height={160}>
                    <LineChart data={chartData} margin={{top:10, right:10, left:-30, bottom:0}}>
                      <XAxis dataKey="date" fontSize={11} stroke="var(--text2)" axisLine={false} tickLine={false}/>
                      <YAxis fontSize={11} stroke="var(--text2)" axisLine={false} tickLine={false}/>
                      <Tooltip contentStyle={{borderRadius:12, border:'none', boxShadow:'var(--shadow)'}}/>
                      <Line type="monotone" dataKey="kg" stroke="var(--acc)" strokeWidth={3} dot={{r:4, fill:'var(--acc)', strokeWidth:2, stroke:'#fff'}}/>
                    </LineChart>
                  </ResponsiveContainer>
                ) : <p style={{fontSize:13, color:'var(--text2)'}}>Ma'lumot topilmadi.</p>}
              </div>
            </>
          )}

          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20, marginTop:32}}>
            <h3 style={{fontSize:20, fontWeight:700}}>Mening Dasturlarim</h3>
            <button onClick={()=>openBuilder()} style={{background:'rgba(0,122,255,0.1)', border:'none', color:'var(--blue)', fontWeight:700, fontSize:14, padding:'8px 16px', borderRadius:16}}>+ Yaratish</button>
          </div>

          {data.programs.length === 0 ? (
            <div className="card" style={{textAlign:'center', padding:'40px 20px', background:'transparent', boxShadow:'none', border:'2px dashed var(--border)'}}>
              <p style={{color:'var(--text2)', fontWeight:500, fontSize:15}}>Sizda hali mashq dasturlari yo'q.</p>
            </div>
          ) : (
            data.programs.map(p => (
              <div key={p.id} className="card" style={{border: data.currentProgramId===p.id ? '2px solid var(--blue)' : '2px solid transparent', transition:'all 0.2s'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16}}>
                  <div>
                    <h3 style={{fontSize:20, fontWeight:800}}>{p.name}</h3>
                    <p style={{color:'var(--text2)', fontSize:13, fontWeight:500, marginTop:2}}>{p.days.length} kunlik tsikl</p>
                  </div>
                  <div style={{display:'flex', gap:8}}>
                    <button onClick={()=>openBuilder(p)} style={{background:'var(--bg)', border:'none', borderRadius:12, padding:'8px 12px', color:'var(--text2)', fontWeight:700}}>Tahrir</button>
                    {data.currentProgramId !== p.id && <button onClick={()=>setData(d=>({...d, currentProgramId:p.id}))} style={{background:'var(--blue)', border:'none', borderRadius:12, padding:'8px 12px', color:'#fff', fontWeight:700}}>Tanlash</button>}
                  </div>
                </div>
                <div style={{display:'flex', gap:8, overflowX:'auto', paddingBottom:8}}>
                  {p.days.map((d,i) => (
                    <div key={i} style={{background:'var(--bg)', padding:'10px 14px', borderRadius:14, flexShrink:0}}>
                      <p style={{fontSize:14, fontWeight:700}}>{d.name}</p>
                      <p style={{fontSize:12, color:'var(--text2)', fontWeight:500}}>{d.exercises.length} mashq</p>
                    </div>
                  ))}
                </div>
              </div>
            ))
          )}
          
          <h3 style={{fontSize:20, fontWeight:700, marginTop:32, marginBottom:16}}>Tarix</h3>
          {data.woLogs.length === 0 ? <p style={{color:'var(--text2)', fontSize:14, paddingLeft:4}}>Hali tarix yo'q.</p> : (
            data.woLogs.slice().reverse().map((log, i) => (
              <div key={i} className="card" style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'16px 20px'}}>
                <div>
                  <h4 style={{fontSize:16, fontWeight:700}}>{log.dayName}</h4>
                  <p style={{fontSize:13, color:'var(--text2)', fontWeight:500, marginTop:2}}>{fmt(log.date)} • {log.dur} min</p>
                </div>
                <div style={{textAlign:'right'}}>
                  <p style={{fontSize:14, color:'var(--text2)', fontWeight:600}}>{log.exs.length} mashq</p>
                </div>
              </div>
            ))
          )}
        </div>
      );
    }

    /* ── ACTIVE WORKOUT SCREEN ── */
    function ActiveWorkoutScreen({workout, data, onFinish, onCancel}) {
      const {day, startTime} = workout;
      const initSets = () => day.exercises.map(ex => ({
        name: ex.name, link: ex.link,
        sets: Array.from({length: ex.sets}, () => ({w:'', r:'', type:'kg', done:false}))
      }));
      const [exSets, setExSets] = useState(initSets);
      const [elapsed, setElapsed] = useState(0);

      useEffect(() => {
        const t = setInterval(()=>setElapsed(Math.floor((Date.now()-startTime)/1000)), 1000);
        return ()=>clearInterval(t);
      }, [startTime]);

      const updateSet = (ei, si, field, val) => setExSets(p=>{ const n=[...p]; n[ei].sets[si][field]=val; return n;});

    function AITab({data, setData}) {
      const [msgs, setMsgs] = useState([{role:'ai', text:"Salom! Men Gemini AI man. Menga qanday fast-food yeganingizni aytsangiz, uning kaloriyasini aytaman va ro'yxatga qo'shish tugmasini beraman!"}]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const endRef = useRef(null);

      useEffect(() => { endRef.current?.scrollIntoView({behavior:'smooth'}); }, [msgs]);

      const callGemini = async (prompt) => {
        if(!data.geminiKey) return "Kechirasiz, Sozlamalar bo'limida Gemini API Key kiritilmagan! Iltimos kalitni kiriting.";
        try {
          const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${data.geminiKey}`);
          const listData = await listRes.json();
          if(listData.error) return "API Kaliti xato: " + listData.error.message;
          
          let mName = "models/gemini-1.5-flash";
          if(listData.models && listData.models.length > 0) {
             const m = listData.models.find(x => x.name.includes("gemini") && x.supportedGenerationMethods && x.supportedGenerationMethods.includes("generateContent"));
             if(m) mName = m.name;
          }

          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${mName}:generateContent?key=${data.geminiKey}`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: "Sen fitness dietologsan. Foydalanuvchi qanday ovqat yeganini aytsa uning taxminiy kaloriya, oqsil, yog, uglevod miqdorini aniqla. \n\nMUHIM: Barcha yozuvlaringdan so'ng (eng oxirida, yangi qatorda) MUTLAQO mana bu formatdagi tekstni qoldir: [ADD: {\"name\":\"Gamburger\", \"cal\": 500, \"p\":20, \"f\":15, \"c\":45}]. Dastur aynan shunga qarab ishlaydi.\n\nFoydalanuvchi: " + prompt }] }] })
          });
          const d = await res.json();
          if(d.error) return "API Xatoligi: " + d.error.message;
          return d.candidates[0].content.parts[0].text;
        } catch(e) { return "Internet yoki API ulanishda xato yuz berdi."; }
      };

      const send = async () => {
        if(!input.trim() || loading) return;
        const q = input.trim();
        setInput(''); setMsgs(p=>[...p, {role:'user', text:q}]);
        setLoading(true);
        const reply = await callGemini(q);
        setMsgs(p=>[...p, {role:'ai', text:reply}]);
        setLoading(false);
      };

      return (
        <div style={{display:'flex', flexDirection:'column', height:'100vh'}}>
          <div className="glass" style={{padding:'60px 16px 16px', borderBottom:'1px solid var(--border)', position:'sticky', top:0, zIndex:10}}>
            <h1 style={{fontSize:28, fontWeight:800, background:'linear-gradient(90deg, var(--blue), var(--purple))', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'}}>Gemini AI</h1>
          </div>
          
          <div style={{flex:1, overflowY:'auto', padding:'20px 16px', paddingBottom:120}}>
            {!data.geminiKey && (
              <div style={{background:'rgba(255,45,85,0.1)', color:'var(--acc)', padding:'16px', borderRadius:'16px', fontSize:14, fontWeight:600, marginBottom:24, lineHeight:1.4}}>
                ⚠️ AI to'liq ishlashi uchun Sozlamalarga Google Gemini API kalitini kiriting. U mutlaqo bepul.
              </div>
            )}
            {msgs.map((m, i) => {
              let text = m.text;
              let parsedFood = null;
              if (m.role === 'ai') {
                const addMatch = text.match(/\[ADD:\s*(\{.*?\})\s*\]/);
                if(addMatch) {
                   text = text.replace(addMatch[0], '');
                   try { parsedFood = JSON.parse(addMatch[1]); } catch(e){}
                }
              }

              return (
                <div key={i} style={{marginBottom:20, display:'flex', justifyContent: m.role==='user'?'flex-end':'flex-start'}}>
                  <div style={{maxWidth:'85%', display:'flex', flexDirection:'column', gap:8}}>
                    <div style={{padding:'14px 18px', borderRadius: m.role==='user'?'24px 24px 6px 24px':'24px 24px 24px 6px', background: m.role==='user'?'var(--blue)':'#fff', color: m.role==='user'?'#fff':'var(--text)', boxShadow:'var(--shadow)', fontSize:16, lineHeight:1.4}}>
                      {text}
                    </div>
                    {parsedFood && (
                       <button onClick={()=>{
                         setData(p => {
                           const item = { id:Date.now(), name:parsedFood.name, grams:100, cal:parsedFood.cal, p:parsedFood.p, f:parsedFood.f, c:parsedFood.c };
                           const n = p.todayNut;
                           return {...p, todayNut: {...n, meals:[...n.meals, item], cal:n.cal+item.cal, p:n.p+item.p, f:n.f+item.f, c:n.c+item.c}};
                         });
                         alert(parsedFood.name + " kiritildi!");
                       }} style={{background:'rgba(52,199,89,0.1)', color:'var(--green)', border:'none', padding:'10px 14px', borderRadius:16, fontWeight:700, fontSize:14, alignSelf:'flex-start', display:'flex', alignItems:'center', gap:8, cursor:'pointer'}}>
                         <span style={{fontSize:18, fontWeight:800}}>+</span> Kundalikka qo'shish ({parsedFood.cal} kkal)
                       </button>
                    )}
                  </div>
                </div>
              );
            })}
            {loading && <div style={{color:'var(--text2)', fontSize:14, fontWeight:600, marginLeft:12}}>Gemini o'ylamoqda...</div>}
            <div ref={endRef}/>
          </div>

          <div className="glass" style={{padding:'16px', position:'fixed', bottom:65, width:'100%', maxWidth:430, left:'50%', transform:'translateX(-50%)', borderTop:'1px solid var(--border)', display:'flex', gap:12}}>
            <input className="input-flat" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')send();}} placeholder="Ikki qism pitsa yedim..." style={{border:'1px solid var(--border)', background:'rgba(255,255,255,0.6)', fontSize:16}}/>
            <button onClick={send} disabled={loading} style={{width:52, height:52, borderRadius:26, background:loading?'var(--text2)':'var(--blue)', border:'none', color:'#fff', fontWeight:800, fontSize:22, display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.2s'}}>↑</button>
          </div>
        </div>
      );
    }

        const hash = window.location.hash;
        if(hash.includes('#import-health')) {
          const params = new URLSearchParams(hash.replace('#import-health',''));
          const cal = parseInt(params.get('cal'));
          if(!isNaN(cal)) {
             setData(p => ({...p, todayNut: {...p.todayNut, burnedCal: cal}}));
             alert("Apple Health'dan " + cal + " kkal muvaffaqiyatli import qilindi!");
             window.history.replaceState(null, '', window.location.pathname);
          }
        }
      }, []);

      const tabs = [
        {id:'home', icon:'🏠', label:'Asosiy'},
        {id:'workout', icon:'💪', label:'Mashq'},
        {id:'nutrition', icon:'🥗', label:'Ovqat'},
        {id:'ai', icon:'🤖', label:'AI'},
        {id:'settings', icon:'⚙️', label:'Sozlama'}
      ];

      return (
        <div style={{maxWidth:430, margin:'0 auto', position:'relative', minHeight:'100vh', background:'var(--bg)', overflow:'hidden'}}>
          {activeWorkout ? (
            <ActiveWorkoutScreen workout={activeWorkout} data={data} onFinish={(exSets, dur)=>{
              const log = { date:td(), dayName:activeWorkout.day.name, dur:Math.round(dur/60), exs: exSets };
              setData(p=>({...p, woLogs:[...p.woLogs, log], woCount:p.woCount+1, streak:p.streak+1, dayIndex:p.dayIndex+1}));
              setActiveWorkout(null); setTab('home');
            }} onCancel={()=>setActiveWorkout(null)}/>
          ) : (
            <div style={{height:'100vh', overflowY:'auto'}}>
              {tab==='home' && <HomeTab data={data} setTab={setTab} setActiveWorkout={setActiveWorkout} setData={setData}/>}
              {tab==='workout' && <WorkoutTab data={data} setData={setData} setActiveWorkout={setActiveWorkout}/>}
              {tab==='nutrition' && <NutritionTab data={data} setData={setData}/>}
              {tab==='ai' && <AITab data={data} setData={setData}/>}
              {tab==='settings' && <SettingsTab data={data} setData={setData}/>}
              
              <div className="glass" style={{position:'fixed', bottom:0, width:'100%', maxWidth:430, left:'50%', transform:'translateX(-50%)', display:'flex', padding:'12px 10px 28px', borderTop:'1px solid rgba(0,0,0,0.06)', zIndex:90}}>
                {tabs.map(t=>(
                  <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1, background:'none', border:'none', display:'flex', flexDirection:'column', alignItems:'center', gap:6, color: tab===t.id?'var(--blue)':'var(--text2)', cursor:'pointer', transition:'all 0.2s'}}>
                    <span style={{fontSize:24, filter: tab===t.id?'none':'grayscale(100%) opacity(0.5)', transform: tab===t.id?'scale(1.15)':'scale(1)'}}>{t.icon}</span>
                    <span style={{fontSize:10, fontWeight:700, letterSpacing:0.5}}>{t.label}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<FitLogPro/>);
  </script>
</body>
</html>
